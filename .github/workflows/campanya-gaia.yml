name: Campanya Gaia IT+FR (un sol ús)

# Es llança NOMÉS a mà. Programa a Buffer els posts de les edicions
# italiana (15-07) i francesa (16-07) d'Acadèmia Gaia.
on:
  workflow_dispatch:

permissions:
  contents: write   # per penjar les imatges de les portades (URL pública)

concurrency:
  group: posts-diaris   # mateix grup que el diari: mai dues execucions alhora
  cancel-in-progress: false

jobs:
  programar:
    runs-on: ubuntu-latest
    env:
      TZ: Europe/Madrid
      BUFFER_ACCESS_TOKEN: ${{ secrets.BUFFER_ACCESS_TOKEN }}
      GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      GH_IMG_REPO: ${{ github.repository }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: pip install --quiet -r requirements.txt
      - name: Programar els posts IT i FR a Buffer
        run: python -u campanya/campanya_gaia_it_fr.py
